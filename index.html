<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pest Tech Calc Pro</title>

<style>
:root{
--pink:#ec4aa5;
--blue:#0ea5e9;
--purple:#7c3aed;
--dark:#111827;
--bg:#f7fbff;
--card:#ffffff;
--border:#dbe3ef;
}

*{
box-sizing:border-box;
}

body{
margin:0;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;
background:var(--bg);
color:var(--dark);
}

header{
padding:18px;
background:linear-gradient(135deg,var(--blue),var(--pink));
color:white;
}

header h1{
margin:0;
font-size:24px;
}

.wrap{
max-width:800px;
margin:auto;
padding:14px;
}

.card{
background:white;
border:1px solid var(--border);
border-radius:18px;
padding:14px;
margin-bottom:14px;
}

h2{
margin-top:0;
}

label{
display:block;
font-weight:700;
margin-top:12px;
margin-bottom:6px;
}

input,
select{
width:100%;
padding:12px;
font-size:18px;
border:1px solid var(--border);
border-radius:12px;
}

button{
border:none;
border-radius:12px;
padding:12px;
font-weight:700;
cursor:pointer;
}

.btnRow{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:8px;
margin-top:8px;
}

.selected{
background:linear-gradient(135deg,var(--purple),var(--pink));
color:white;
}

.result{
margin-top:12px;
padding:14px;
background:#eef9ff;
border-radius:14px;
font-size:20px;
font-weight:700;
}

.tab{
background:white;
border:1px solid var(--border);
}

.tab.active{
background:linear-gradient(135deg,var(--purple),var(--pink));
color:white;
}

.hidden{
display:none;
}
</style>
</head>

<body>

<header>
<h1>Pest Tech Calc Pro</h1>
<p>Finished Mix %, Label Rate Lookup, Refill Math</p>
</header>

<div class="wrap">

<div class="btnRow">
<button class="tab active" onclick="showTab('lookup',this)">Lookup</button>
<button class="tab" onclick="showTab('mix',this)">Mix %</button>
<button class="tab" onclick="showTab('rate',this)">Rate</button>
<button class="tab" onclick="showTab('refill',this)">Refill</button>
</div>
<!-- QUICK LOOKUP TAB -->

<div id="lookup" class="card">

<h2>Quick Label Lookup</h2>

<label>Tank Size</label>

<div class="btnRow">
<button class="tankBtn selected" onclick="setTank(1,this)">1 Gal</button>
<button class="tankBtn" onclick="setTank(2.5,this)">2.5 Gal</button>
<button class="tankBtn" onclick="setTank(5,this)">5 Gal</button>
<button class="tankBtn" onclick="setTank(10,this)">10 Gal</button>
</div>

<label style="margin-top:15px;">Product</label>

<select id="lookupProduct" onchange="updateLookup()">
</select>

<div id="lookupResult" class="result">
Select Product
</div>

</div>

<!-- MIX TAB -->

<div id="mix" class="card hidden">

<h2>Finished Mix % Calculator</h2>

<label>Product</label>

<select id="mixProduct">
</select>

<label>Amount Added</label>

<input
type="number"
id="amountAdded"
placeholder="Enter amount">

<label>Unit</label>

<div class="btnRow">
<button class="unitBtn selected" onclick="setUnit('g',this)">Grams</button>
<button class="unitBtn" onclick="setUnit('floz',this)">Fl Oz</button>
<button class="unitBtn" onclick="setUnit('ml',this)">mL</button>
<button onclick="calcMix()">Calc</button>
</div>

<div id="mixResult" class="result">
Waiting...
</div>

</div>

<script>

let tankSize = 1;
let unitType = "g";

const PRODUCTS = [

{
name:"Alpine WSG",
unit:"g",
perGal:10
},

{
name:"Alpine WSG (20g)",
unit:"g",
perGal:20
},

{
name:"Alpine WSG (30g)",
unit:"g",
perGal:30
},

{
name:"CrossCheck Plus",
unit:"floz",
perGal:1.2
},

{
name:"Taurus SC",
unit:"floz",
perGal:0.8
},

{
name:"Gentrol EC3",
unit:"floz",
perGal:1.0
},

{
name:"Bifen I/T",
unit:"floz",
perGal:1.0
},

{
name:"Niban Granules",
unit:"lbs",
perGal:0
}

];

function populateProducts(){

let lookup =
document.getElementById("lookupProduct");

let mix =
document.getElementById("mixProduct");

PRODUCTS.forEach(p=>{

lookup.innerHTML +=
`<option>${p.name}</option>`;

mix.innerHTML +=
`<option>${p.name}</option>`;

});

updateLookup();

}

function setTank(size,btn){

tankSize=size;

document
.querySelectorAll(".tankBtn")
.forEach(b=>b.classList.remove("selected"));

btn.classList.add("selected");

updateLookup();

}

function setUnit(unit,btn){

unitType=unit;

document
.querySelectorAll(".unitBtn")
.forEach(b=>b.classList.remove("selected"));

btn.classList.add("selected");

}

function updateLookup(){

let selected =
document.getElementById("lookupProduct").value;

let product =
PRODUCTS.find(
p=>p.name===selected
);

if(!product) return;

let total =
product.perGal * tankSize;

document.getElementById(
"lookupResult"
).innerHTML =

`${selected}<br>
${total.toFixed(2)}
${product.unit}`;

}
<!-- RATE TAB -->

<div id="rate" class="card hidden">
<h2>Label Rate Calculator</h2>

<label>Product</label>
<select id="rateProduct"></select>

<label>Tank Size</label>
<div class="btnRow">
<button onclick="setTank(1,this)">1 Gal</button>
<button onclick="setTank(2.5,this)">2.5 Gal</button>
<button onclick="setTank(5,this)">5 Gal</button>
<button onclick="setTank(10,this)">10 Gal</button>
</div>

<button onclick="calcRate()">Calculate Rate</button>

<div id="rateResult" class="result">Waiting...</div>
</div>

<!-- REFILL TAB -->

<div id="refill" class="card hidden">
<h2>Refill Calculator</h2>

<label>Original Product Amount</label>
<input id="originalProduct" type="number" placeholder="Example: 3">

<label>Original Tank Size</label>
<input id="originalTank" type="number" value="2.5">

<label>Remaining Gallons</label>
<input id="remainingGallons" type="number" placeholder="Example: 1.25">

<label>Refill Back To</label>
<input id="refillTo" type="number" value="2.5">

<button onclick="calcRefill()">Calculate Refill</button>

<div id="refillResult" class="result">Waiting...</div>
</div>

</div>

<script>

function calcMix(){

let amount = parseFloat(document.getElementById("amountAdded").value);
let productName = document.getElementById("mixProduct").value;

if(!amount){
document.getElementById("mixResult").innerHTML = "Enter an amount.";
return;
}

let percent;

if(unitType === "g"){
percent = (amount / tankSize) / 100;
}

if(unitType === "floz"){
percent = (amount / (tankSize * 128)) * 100;
}

if(unitType === "ml"){
percent = (amount / (tankSize * 3785.41)) * 100;
}

let waterPercent = 100 - percent;

document.getElementById("mixResult").innerHTML =
`${productName}<br>
Finished Mix: ${percent.toFixed(4)}%<br>
Water/Carrier: ${waterPercent.toFixed(4)}%`;

}

function calcRate(){

let selected = document.getElementById("rateProduct").value;

let product = PRODUCTS.find(p=>p.name===selected);

if(!product){
document.getElementById("rateResult").innerHTML = "Select product.";
return;
}

if(product.perGal === 0){
document.getElementById("rateResult").innerHTML =
`${product.name}<br>Granule/bait product. Use label application rate.`;
return;
}

let total = product.perGal * tankSize;

document.getElementById("rateResult").innerHTML =
`${product.name}<br>
Add ${total.toFixed(2)} ${product.unit}<br>
For ${tankSize} gallons`;

}

function calcRefill(){

let originalProduct = parseFloat(document.getElementById("originalProduct").value);
let originalTank = parseFloat(document.getElementById("originalTank").value);
let remaining = parseFloat(document.getElementById("remainingGallons").value);
let refillTo = parseFloat(document.getElementById("refillTo").value);

if(!originalProduct || !originalTank || !refillTo){
document.getElementById("refillResult").innerHTML = "Enter refill info.";
return;
}

let productPerGal = originalProduct / originalTank;
let waterToAdd = refillTo - remaining;
let productToAdd = productPerGal * waterToAdd;

document.getElementById("refillResult").innerHTML =
`Add ${productToAdd.toFixed(3)} product units<br>
Add ${waterToAdd.toFixed(2)} gallons water<br>
Original strength: ${productPerGal.toFixed(3)} per gallon`;

}

function showTab(tabId,btn){

document.querySelectorAll(".card").forEach(card=>{
card.classList.add("hidden");
});

document.getElementById(tabId).classList.remove("hidden");

document.querySelectorAll(".tab").forEach(t=>{
t.classList.remove("active");
});

btn.classList.add("active");

}

function finishSetup(){

let rate =
document.getElementById("rateProduct");

PRODUCTS.forEach(p=>{
rate.innerHTML += `<option>${p.name}</option>`;
});

populateProducts();

}

finishSetup();

</script>

</body>
</html>
