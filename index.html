<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Pest Tech Calculator</title>

<style>
body{
font-family:Arial,sans-serif;
background:#f7fbff;
padding:20px;
margin:0;
}

.card{
background:white;
padding:20px;
border-radius:12px;
box-shadow:0 2px 10px rgba(0,0,0,.1);
max-width:500px;
margin:auto;
}

h1{
color:#ec4aa5;
text-align:center;
}

label{
font-weight:bold;
display:block;
margin-top:15px;
}

select,input{
width:100%;
padding:12px;
font-size:18px;
margin-top:5px;
}

button{
width:100%;
padding:15px;
font-size:20px;
background:#0ea5e9;
color:white;
border:none;
border-radius:10px;
margin-top:20px;
}

.result{
font-size:28px;
font-weight:bold;
text-align:center;
margin-top:20px;
color:#7c3aed;
}
</style>
</head>

<body>

<div class="card">

<h1>Pest Tech Calculator</h1>

<label>Product</label>
<select id="product">
<option>CrossCheck Plus</option>
<option>Taurus SC</option>
<option>Alpine WSG</option>
<option>Gentrol EC3</option>
<option>Bifen IT</option>
<option>Niban</option>
</select>

<label>Amount Added</label>
<input id="amount" type="number">

<label>Tank Size</label>
<select id="tank">
<option value="1">1 Gallon</option>
<option value="2.5">2.5 Gallons</option>
<option value="5">5 Gallons</option>
<option value="10">10 Gallons</option>
</select>

<button onclick="calc()">Calculate</button>

<div id="result" class="result"></div>

</div>

<script>
function calc(){

let amount =
parseFloat(document.getElementById('amount').value);

let tank =
parseFloat(document.getElementById('tank').value);

let percent =
(amount / (tank * 128)) * 100;

document.getElementById('result').innerHTML =
percent.toFixed(3) + "%";
}
</script>

</body>
</html>
