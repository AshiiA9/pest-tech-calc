<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Pest Tech Calc Pro</title>

<style>
body{
  margin:0;
  background:#eef3f8;
  font-family:-apple-system,BlinkMacSystemFont,sans-serif;
}

.header{
  background:linear-gradient(90deg,#0ea5e9,#ec4aa5);
  color:white;
  padding:30px;
}

.header h1{
  margin:0;
  font-size:22px;
}

.header p{
  margin-top:10px;
}

.wrap{
  padding:18px;
}

.card{
  background:white;
  border-radius:22px;
  padding:20px;
  border:1px solid #d9e3ef;
}

.tabs{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:10px;
  margin-bottom:15px;
}

.tab{
  border:none;
  border-radius:16px;
  padding:14px;
  font-weight:700;
  background:white;
  border:2px solid #d9e3ef;
  color:#1976ff;
}

.tab.active{
  background:linear-gradient(90deg,#7c3aed,#ec4aa5);
  color:white;
}

h2{
  margin-top:0;
}

label{
  display:block;
  font-weight:700;
  margin-top:15px;
  margin-bottom:8px;
}

select,input{
  width:100%;
  padding:14px;
  border-radius:14px;
  border:none;
  background:#edf2f7;
  font-size:18px;
}

.grid4{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:10px;
}

.choice{
  border:none;
  padding:14px;
  border-radius:16px;
  font-weight:700;
  background:#ececec;
  color:#1976ff;
}

.choice.active{
  background:linear-gradient(90deg,#7c3aed,#ec4aa5);
  color:white;
}

.result{
  margin-top:20px;
  padding:20px;
  border-radius:18px;
  background:#edf7ff;
  font-size:20px;
  font-weight:700;
}

.hidden{
  display:none;
}

.calcBtn{
  width:100%;
  margin-top:18px;
  border:none;
  padding:16px;
  border-radius:16px;
  background:#0ea5e9;
  color:white;
  font-size:18px;
  font-weight:700;
}
</style>
</head>

<body>

<div class="header">
<h1>Pest Tech Calc Pro</h1>
<p>Finished Mix %, Label Rate Lookup, Refill Math</p>
</div>

<div class="wrap">

<div class="tabs">
<button class="tab active" onclick="showTab('lookup',this)">Lookup</button>
<button class="tab" onclick="showTab('mix',this)">Mix %</button>
<button class="tab" onclick="showTab('rate',this)">Rate</button>
<button class="tab" onclick="showTab('refill',this)">Refill</button>
</div>

<div class="card">

<div id="lookupTab">

<h2>Quick Label Lookup</h2>

<label>Tank Size</label>

<div class="grid4">
<button class="choice tank active" onclick="setTank(this,1)">1 Gal</button>
<button class="choice tank" onclick="setTank(this,2.5)">2.5 Gal</button>
<button class="choice tank" onclick="setTank(this,5)">5 Gal</button>
<button class="choice tank" onclick="setTank(this,10)">10 Gal</button>
</div>

<label>Product</label>

<select id="lookupProduct">
<option value="">Select Product</option>
<option>CrossCheck Plus</option>
<option>Alpine WSG</option>
<option>Gentrol EC3</option>
<option>Taurus SC</option>
<option>Cyzmic CS</option>
<option>Niban Granules</option>
<option>Bifen I/T</option>
</select>

<div class="result" id="lookupResult">
Select Product
</div>

</div>

<div id="mixTab" class="hidden">

<h2>Finished Mix % Calculator</h2>

<label>Amount Added</label>
<input id="mixAmount" type="number">

<label>Unit</label>

<div class="grid4">
<button class="choice unit active" onclick="setUnit(this,'g')">g</button>
<button class="choice unit" onclick="setUnit(this,'oz')">oz</button>
<button class="choice unit" onclick="setUnit(this,'ml')">ml</button>
<button class="choice unit" onclick="setUnit(this,'floz')">fl oz</button>
</div>

<label>Total Water (Gallons)</label>
<input id="mixGallons" type="number" value="1">

<button class="calcBtn" onclick="calcMix()">
Calculate %
</button>

<div class="result" id="mixResult">
Waiting...
</div>

</div>

<div id="rateTab" class="hidden">

<h2>Label Rate Calculator</h2>

<label>Product</label>

<select id="rateProduct">
<option>CrossCheck Plus</option>
<option>Alpine WSG</option>
<option>Gentrol EC3</option>
<option>Taurus SC</option>
<option>Cyzmic CS</option>
<option>Bifen I/T</option>
</select>

<label>Tank Size</label>

<select id="rateTank">
<option value="1">1 Gallon</option>
<option value="2.5">2.5 Gallon</option>
<option value="5">5 Gallon</option>
<option value="10">10 Gallon</option>
</select>

<button class="calcBtn" onclick="lookupRate()">
Lookup Rate
</button>

<div class="result" id="rateResult">
Waiting...
</div>

</div>

<div id="refillTab" class="hidden">

<h2>Refill Calculator</h2>

<label>Original Amount Added</label>
<input id="origAmount" type="number">

<label>Original Tank Size</label>
<input id="origTank" type="number">

<label>Gallons Remaining</label>
<input id="remaining" type="number">

<label>Gallons Being Added</label>
<input id="added" type="number">

<button class="calcBtn" onclick="calcRefill()">
Calculate Refill
</button>

<div class="result" id="refillResult">
Waiting...
</div>

</div>

</div>
</div>

<script>

let currentTank = 1;
let currentUnit = "g";

const PRODUCTS = {
 "CrossCheck Plus": {1:1.2,2.5:3,5:6,10:12,unit:"fl oz"},
 "Alpine WSG": {1:10,2.5:30,5:50,10:100,unit:"g"},
 "Gentrol EC3": {1:1,2.5:2.5,5:5,10:10,unit:"fl oz"},
 "Taurus SC": {1:0.8,2.5:2,5:4,10:8,unit:"fl oz"},
 "Cyzmic CS": {1:0.5,2.5:1.25,5:2.5,10:5,unit:"fl oz"},
 "Bifen I/T": {1:1,2.5:2.5,5:5,10:10,unit:"fl oz"}
};function showTab(tab,btn){

document.querySelectorAll(".tab").forEach(b=>{
b.classList.remove("active");
});

btn.classList.add("active");

document.getElementById("lookupTab").classList.add("hidden");
document.getElementById("mixTab").classList.add("hidden");
document.getElementById("rateTab").classList.add("hidden");
document.getElementById("refillTab").classList.add("hidden");

document.getElementById(tab + "Tab").classList.remove("hidden");

}

function setTank(btn,tank){

currentTank = tank;

document.querySelectorAll(".tank").forEach(b=>{
b.classList.remove("active");
});

btn.classList.add("active");

updateLookup();

}

function setUnit(btn,unit){

currentUnit = unit;

document.querySelectorAll(".unit").forEach(b=>{
b.classList.remove("active");
});

btn.classList.add("active");

}

document.getElementById("lookupProduct").addEventListener("change",updateLookup);

function updateLookup(){

let product = document.getElementById("lookupProduct").value;

if(product === ""){
document.getElementById("lookupResult").innerHTML = "Select Product";
return;
}

if(product === "Niban Granules"){
document.getElementById("lookupResult").innerHTML =
"Niban Granules<br>Use label granule rate. Not mixed in water.";
return;
}

let amount = PRODUCTS[product][currentTank];
let unit = PRODUCTS[product].unit;

document.getElementById("lookupResult").innerHTML =
product + "<br>Add " + amount + " " + unit + "<br>For " + currentTank + " gallons";

}

function calcMix(){

let amount = parseFloat(document.getElementById("mixAmount").value);
let gallons = parseFloat(document.getElementById("mixGallons").value);

if(!amount || !gallons){
document.getElementById("mixResult").innerHTML = "Enter amount and gallons.";
return;
}

let percent = 0;

if(currentUnit === "g"){
percent = (amount / gallons) / 100;
}

if(currentUnit === "oz"){
percent = (amount * 28.3495 / gallons) / 100;
}

if(currentUnit === "ml"){
percent = (amount / (gallons * 3785.41)) * 100;
}

if(currentUnit === "floz"){
percent = (amount / (gallons * 128)) * 100;
}

let water = 100 - percent;

document.getElementById("mixResult").innerHTML =
"Finished Product: " + percent.toFixed(4) + "%<br>" +
"Water/Carrier: " + water.toFixed(4) + "%";

}

function lookupRate(){

let product = document.getElementById("rateProduct").value;
let tank = parseFloat(document.getElementById("rateTank").value);

let amount = PRODUCTS[product][tank];
let unit = PRODUCTS[product].unit;

document.getElementById("rateResult").innerHTML =
product + "<br>Add " + amount + " " + unit + "<br>For " + tank + " gallons";

}

function calcRefill(){

let origAmount = parseFloat(document.getElementById("origAmount").value);
let origTank = parseFloat(document.getElementById("origTank").value);
let remaining = parseFloat(document.getElementById("remaining").value);
let added = parseFloat(document.getElementById("added").value);

if(!origAmount || !origTank || !added){
document.getElementById("refillResult").innerHTML = "Enter refill info.";
return;
}

let ratePerGal = origAmount / origTank;
let productToAdd = ratePerGal * added;

document.getElementById("refillResult").innerHTML =
"Add " + productToAdd.toFixed(3) + " product units<br>" +
"Add " + added + " gallons water<br>" +
"Original rate: " + ratePerGal.toFixed(3) + " per gallon";

}

updateLookup();

</script>

</body>
</html>
