<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Pest Tech Calc Pro</title>

<style>
body{
  margin:0;
  background:#eef3f8;
  font-family:-apple-system,BlinkMacSystemFont,sans-serif;
}
.header{
  background:linear-gradient(90deg,#0ea5e9,#ec4aa5);
  color:white;
  padding:28px 18px;
}
.header h1{margin:0;font-size:24px;}
.header p{margin:8px 0 0;}
.wrap{padding:16px;max-width:800px;margin:auto;}
.tabs{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:8px;
  margin-bottom:14px;
}
.tab{
  border:2px solid #d9e3ef;
  border-radius:14px;
  padding:12px 6px;
  font-weight:800;
  background:white;
  color:#1976ff;
}
.tab.active{
  background:linear-gradient(90deg,#7c3aed,#ec4aa5);
  color:white;
}
.card{
  background:white;
  border-radius:22px;
  padding:18px;
  border:1px solid #d9e3ef;
}
.hidden{display:none;}
label{
  display:block;
  font-weight:800;
  margin-top:15px;
  margin-bottom:7px;
}
select,input{
  width:100%;
  padding:14px;
  border-radius:14px;
  border:none;
  background:#edf2f7;
  font-size:18px;
  box-sizing:border-box;
}
.grid4{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:8px;
}
.choice{
  border:none;
  padding:13px 6px;
  border-radius:14px;
  font-weight:800;
  background:#ececec;
  color:#1976ff;
}
.choice.active{
  background:linear-gradient(90deg,#7c3aed,#ec4aa5);
  color:white;
}
.calcBtn{
  width:100%;
  margin-top:18px;
  border:none;
  padding:16px;
  border-radius:16px;
  background:#0ea5e9;
  color:white;
  font-size:18px;
  font-weight:800;
}
.result{
  margin-top:18px;
  padding:18px;
  border-radius:18px;
  background:#edf7ff;
  font-size:20px;
  font-weight:800;
  line-height:1.45;
}
</style>
</head>

<body>

<div class="header">
<h1>Pest Tech Calc Pro</h1>
<p>Active Ingredient %, Carrier %, Lookup, Refill Math</p>
</div>

<div class="wrap">

<div class="tabs">
<button class="tab active" onclick="showTab('lookup',this)">Lookup</button>
<button class="tab" onclick="showTab('mix',this)">AI %</button>
<button class="tab" onclick="showTab('rate',this)">Rate</button>
<button class="tab" onclick="showTab('refill',this)">Refill</button>
</div>

<div class="card">

<div id="lookupTab">
<h2>Quick Label Lookup</h2>

<label>Tank Size</label>
<div class="grid4">
<button class="choice tank active" onclick="setTank(this,1)">1 Gal</button>
<button class="choice tank" onclick="setTank(this,2.5)">2.5 Gal</button>
<button class="choice tank" onclick="setTank(this,5)">5 Gal</button>
<button class="choice tank" onclick="setTank(this,10)">10 Gal</button>
</div>

<label>Product</label>
<select id="lookupProduct" onchange="updateLookup()">
<option value="">Select Product</option>
<option>CrossCheck Plus</option>
<option>Alpine WSG</option>
<option>Gentrol EC3</option>
<option>Taurus SC</option>
<option>Cyzmic CS</option>
<option>Bifen I/T</option>
<option>Niban Granules</option>
</select>

<div class="result" id="lookupResult">Select Product</div>
</div>
<div id="mixTab" class="hidden">
<h2>Finished Active Ingredient %</h2>

<label>Product</label>
<select id="mixProduct">
<option>CrossCheck Plus</option>
<option>Alpine WSG</option>
<option>Gentrol EC3</option>
<option>Taurus SC</option>
<option>Cyzmic CS</option>
<option>Bifen I/T</option>
</select>

<label>Amount Added</label>
<input id="mixAmount" type="number" placeholder="Example: 3">

<label>Unit</label>
<div class="grid4">
<button class="choice unit active" onclick="setUnit(this,'floz')">fl oz</button>
<button class="choice unit" onclick="setUnit(this,'g')">g</button>
<button class="choice unit" onclick="setUnit(this,'ml')">ml</button>
<button class="choice unit" onclick="setUnit(this,'oz')">oz</button>
</div>

<label>Total Water / Carrier Gallons</label>
<input id="mixGallons" type="number" value="1">

<button class="calcBtn" onclick="calcMix()">Calculate Active %</button>

<div class="result" id="mixResult">Waiting...</div>
</div>

<div id="rateTab" class="hidden">
<h2>Label Rate Calculator</h2>

<label>Product</label>
<select id="rateProduct">
<option>CrossCheck Plus</option>
<option>Alpine WSG</option>
<option>Gentrol EC3</option>
<option>Taurus SC</option>
<option>Cyzmic CS</option>
<option>Bifen I/T</option>
</select>

<label>Tank Size</label>
<select id="rateTank">
<option value="1">1 Gallon</option>
<option value="2.5">2.5 Gallons</option>
<option value="5">5 Gallons</option>
<option value="10">10 Gallons</option>
</select>

<button class="calcBtn" onclick="lookupRate()">Lookup Rate</button>

<div class="result" id="rateResult">Waiting...</div>
</div>
<div id="refillTab" class="hidden">
<h2>Refill Calculator</h2>

<label>Original Product Amount</label>
<input id="origAmount" type="number" placeholder="Example: 3">

<label>Original Tank Size</label>
<input id="origTank" type="number" placeholder="Example: 2.5">

<label>Gallons Being Added</label>
<input id="added" type="number" placeholder="Example: 1.25">

<button class="calcBtn" onclick="calcRefill()">Calculate Refill</button>

<div class="result" id="refillResult">Waiting...</div>
</div>

</div>
</div>

<script>
let currentTank = 1;
let currentUnit = "floz";

const PRODUCTS = {
  "CrossCheck Plus": { unit:"fl oz", ai:6.4, rates:{1:1.2,2.5:3,5:6,10:12} },
  "Alpine WSG": { unit:"g", ai:100, rates:{1:30,2.5:75,5:150,10:300} },
  "Gentrol EC3": { unit:"fl oz", ai:9, rates:{1:1,2.5:2.5,5:5,10:10} },
  "Taurus SC": { unit:"fl oz", ai:9.1, rates:{1:0.8,2.5:2,5:4,10:8} },
  "Cyzmic CS": { unit:"fl oz", ai:9.7, rates:{1:0.5,2.5:1.25,5:2.5,10:5} },
  "Bifen I/T": { unit:"fl oz", ai:7.9, rates:{1:1,2.5:2.5,5:5,10:10} }
};

function showTab(tab,btn){
  document.querySelectorAll(".tab").forEach(b=>b.classList.remove("active"));
  btn.classList.add("active");

  document.getElementById("lookupTab").classList.add("hidden");
  document.getElementById("mixTab").classList.add("hidden");
  document.getElementById("rateTab").classList.add("hidden");
  document.getElementById("refillTab").classList.add("hidden");

  document.getElementById(tab + "Tab").classList.remove("hidden");
}

function setTank(btn,tank){
  currentTank = tank;
  document.querySelectorAll(".tank").forEach(b=>b.classList.remove("active"));
  btn.classList.add("active");
  updateLookup();
}

function setUnit(btn,unit){
  currentUnit = unit;
  document.querySelectorAll(".unit").forEach(b=>b.classList.remove("active"));
  btn.classList.add("active");
}
